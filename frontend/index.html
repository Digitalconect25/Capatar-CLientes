<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeMovil Lead Engine - Vista previa</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #18212f; }
      .wrap { max-width: 1024px; margin: 0 auto; padding: 20px; }
      .grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
      .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
      h1 { margin: 0 0 12px; }
      label { display:block; margin: 8px 0 4px; font-size: 14px; }
      input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #cdd7e3; }
      button { margin-top: 12px; background:#1652f0; color:#fff; border:0; padding:10px 12px; border-radius:8px; cursor:pointer; }
      .pill { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; color:#fff; }
      .alta { background:#0b9b54; }
      .media { background:#f39c12; }
      .baja { background:#e74c3c; }
      .lead { border-top:1px solid #edf1f5; padding:10px 0; }
      code { background:#f3f5f8; padding:2px 4px; border-radius:4px; }
      @media (max-width: 900px){ .grid{ grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>VibeMovil Lead Engine · Vista previa</h1>
      <div class="grid">
        <section class="card">
          <h2>Nuevo lead (demo)</h2>
          <label>Nombre</label><input id="full_name" value="Laura García" />
          <label>Email</label><input id="email" value="laura@example.com" />
          <label>Teléfono</label><input id="phone" value="+34 612345678" />
          <label>Código postal</label><input id="postal_code" value="28001" />
          <label>Ciudad</label><input id="city" value="Madrid" />
          <label>Región</label><input id="region" value="Madrid" />
          <label>Tipo de lead</label>
          <select id="lead_type">
            <option>portabilidad</option><option selected>fibra_movil</option><option>solo_movil</option><option>autonomo_pyme</option>
          </select>
          <label>Presupuesto (€)</label><input id="budget_eur" type="number" value="45" />
          <label>Canal preferido</label>
          <select id="preferred_channel"><option selected>llamada</option><option>email</option><option>sms</option><option>whatsapp</option></select>
          <label>Mejor franja</label>
          <select id="best_time_slot"><option>manana</option><option selected>tarde</option><option>noche</option></select>
          <label>Fuente</label>
          <select id="source"><option selected>meta_ads</option><option>web</option><option>referido</option><option>organico</option></select>
          <label><input id="wants_portability" type="checkbox" checked /> Quiere portabilidad</label>
          <label><input id="has_confirmed_coverage" type="checkbox" checked /> Cobertura confirmada</label>
          <label><input id="gdpr_consent" type="checkbox" checked /> Consentimiento RGPD</label>
          <button id="btn">Guardar lead</button>
          <button id="clear" type="button" style="background:#a0a8b3">Borrar todos</button>
          <p id="status"><small>Funciona sin API: guarda todo en tu navegador (localStorage).</small></p>
        </section>

        <section class="card">
          <h2>Leads captados (preview)</h2>
          <div id="results"></div>
        </section>
      </div>
      <p style="margin-top:16px">Modo gratuito sin servidor: diseño funcional + almacenamiento local.</p>
    </div>

    <script>
      const results = document.getElementById('results');
      let demoLeads = JSON.parse(localStorage.getItem('vibemovil_leads') || '[]');
      const statusEl = document.getElementById('status');
      
      function persist() {
        localStorage.setItem('vibemovil_leads', JSON.stringify(demoLeads));
      }

      function scoreLead(lead) {
        let score = 0;
        if (lead.source === 'meta_ads') score += 20;
        else if (lead.source === 'referido') score += 30;
        else score += 10;
        if (lead.wants_portability) score += 40;
        if (lead.has_confirmed_coverage) score += 25;
        if (lead.best_time_slot === 'manana' || lead.best_time_slot === 'tarde') score += 15;
        else score += 5;
        if (lead.budget_eur >= 20 && lead.budget_eur <= 60) score += 20;
        else if (lead.budget_eur > 60) score += 10;
        if (lead.lead_type === 'fibra_movil') score += 15;
        if (lead.lead_type === 'autonomo_pyme') score += 20;
        return Math.min(score, 100);
      }

      function priority(score) {
        if (score >= 75) return 'alta';
        if (score >= 45) return 'media';
        return 'baja';
      }

      function actionFor(lead, score) {
        if (score >= 75) return 'Llamar en <5 min y enviar email de oferta personalizada';
        if (lead.preferred_channel === 'sms') return 'Enviar SMS y programar llamada en 30 min';
        if (lead.preferred_channel === 'email') return 'Enviar email con planes y recordatorio';
        if (lead.preferred_channel === 'whatsapp') return 'Pedir autorización explícita antes de WhatsApp';
        return 'Programar llamada comercial en la franja indicada';
      }

      function render() {
        if (!demoLeads.length) {
          results.innerHTML = '<p><small>No hay leads todavía.</small></p>';
          return;
        }
        results.innerHTML = demoLeads.map(l => `
          <div class="lead">
            <strong>${l.full_name}</strong>
            <span class="pill ${l.priority}">${l.priority.toUpperCase()}</span>
            <div>Score: <b>${l.score}</b></div>
            <div>Acción: ${l.action}</div>
          </div>
        `).join('');
      }

      document.getElementById('btn').addEventListener('click', () => {
        const payload = {
          full_name: document.getElementById('full_name').value,
          phone: document.getElementById('phone').value,
          email: document.getElementById('email').value,
          postal_code: document.getElementById('postal_code').value,
          city: document.getElementById('city').value,
          region: document.getElementById('region').value,
          lead_type: document.getElementById('lead_type').value,
          budget_eur: Number(document.getElementById('budget_eur').value),
          wants_portability: document.getElementById('wants_portability').checked,
          preferred_channel: document.getElementById('preferred_channel').value,
          best_time_slot: document.getElementById('best_time_slot').value,
          has_confirmed_coverage: document.getElementById('has_confirmed_coverage').checked,
          gdpr_consent: document.getElementById('gdpr_consent').checked,
          source: document.getElementById('source').value,
        };

        if (!payload.gdpr_consent) {
          statusEl.innerHTML = '<small style="color:#e74c3c">Debes aceptar consentimiento RGPD.</small>';
          return;
        }

        if (!payload.full_name || !payload.phone || !payload.postal_code) {
          statusEl.innerHTML = '<small style="color:#e74c3c">Completa nombre, teléfono y código postal.</small>';
          return;
        }

        const score = scoreLead(payload);
        demoLeads.unshift({
          ...payload,
          id: Date.now(),
          score,
          priority: priority(score),
          action: actionFor(payload, score),
        });
        persist();
        render();
        statusEl.innerHTML = '<small style="color:#0b9b54">Lead guardado localmente sin API.</small>';
      });

      document.getElementById('clear').addEventListener('click', () => {
        demoLeads = [];
        persist();
        render();
        statusEl.innerHTML = '<small>Leads borrados.</small>';
      });

      render();
    </script>
  </body>
</html>
